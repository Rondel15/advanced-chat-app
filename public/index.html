<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexChat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<style>
  :root {
    --bg:        #0a0a0f;
    --bg2:       #111118;
    --bg3:       #1a1a24;
    --bg4:       #22222e;
    --border:    rgba(255,255,255,0.07);
    --border2:   rgba(255,255,255,0.12);
    --accent:    #7c6af7;
    --accent2:   #a594ff;
    --accent-bg: rgba(124,106,247,0.12);
    --green:     #3dd68c;
    --green-bg:  rgba(61,214,140,0.10);
    --red:       #f56565;
    --amber:     #f6ad55;
    --text:      #e8e6f0;
    --text2:     #9896a8;
    --text3:     #5c5a6a;
    --font-display: 'Syne', sans-serif;
    --font-mono:    'DM Mono', monospace;
    --radius:    10px;
    --radius-lg: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    height: 100vh;
    overflow: hidden;
    display: flex;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  .sidebar-header {
    padding: 20px 18px 16px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-dot {
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  .logo span { color: var(--accent2); }

  .user-badge {
    margin-top: 12px;
    padding: 8px 10px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
  }

  .avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--accent-bg);
    border: 1px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 500;
    color: var(--accent2);
    flex-shrink: 0;
    font-family: var(--font-display);
  }

  .user-name { color: var(--text); font-weight: 500; }
  .user-tag  { color: var(--text3); font-size: 10px; margin-top: 1px; }

  .status-dot {
    width: 6px;
    height: 6px;
    background: var(--green);
    border-radius: 50%;
    margin-left: auto;
    box-shadow: 0 0 6px var(--green);
  }

  .sidebar-section {
    padding: 14px 18px 8px;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    font-weight: 500;
  }

  .rooms-list { flex: 1; overflow-y: auto; padding: 0 10px; }
  .rooms-list::-webkit-scrollbar { width: 3px; }
  .rooms-list::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }

  .room-item {
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text2);
    transition: all 0.15s;
    margin-bottom: 2px;
    font-size: 12.5px;
  }

  .room-item:hover { background: var(--bg3); color: var(--text); }

  .room-item.active {
    background: var(--accent-bg);
    color: var(--accent2);
    border: 1px solid rgba(124,106,247,0.2);
  }

  .room-hash {
    font-size: 14px;
    color: var(--text3);
    font-weight: 300;
  }

  .room-item.active .room-hash { color: var(--accent); }

  .room-unread {
    margin-left: auto;
    background: var(--accent);
    color: #fff;
    font-size: 9px;
    padding: 2px 5px;
    border-radius: 99px;
    font-weight: 500;
  }

  .new-room-wrap { padding: 10px; }

  .new-room-form {
    display: flex;
    gap: 6px;
  }

  .new-room-form input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    outline: none;
    transition: border 0.15s;
  }

  .new-room-form input::placeholder { color: var(--text3); }
  .new-room-form input:focus { border-color: var(--accent); }

  .btn-icon {
    width: 32px;
    height: 32px;
    background: var(--accent-bg);
    border: 1px solid rgba(124,106,247,0.3);
    border-radius: 8px;
    color: var(--accent2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .btn-icon:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .sidebar-footer {
    padding: 12px 14px;
    border-top: 1px solid var(--border);
  }

  .btn-logout {
    width: 100%;
    padding: 8px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text3);
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.15s;
  }

  .btn-logout:hover {
    border-color: var(--red);
    color: var(--red);
    background: rgba(245,101,101,0.05);
  }

  /* ── MAIN CHAT ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  .chat-header {
    padding: 0 24px;
    height: 60px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg2);
    flex-shrink: 0;
  }

  .chat-room-name {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .chat-room-name .hash { color: var(--accent); font-family: var(--font-mono); font-weight: 300; }

  .connection-badge {
    margin-left: auto;
    padding: 4px 10px;
    border-radius: 99px;
    font-size: 10px;
    letter-spacing: 0.08em;
    display: flex;
    align-items: center;
    gap: 5px;
    border: 1px solid transparent;
  }

  .connection-badge.connected {
    background: var(--green-bg);
    color: var(--green);
    border-color: rgba(61,214,140,0.2);
  }

  .connection-badge.disconnected {
    background: rgba(245,101,101,0.1);
    color: var(--red);
    border-color: rgba(245,101,101,0.2);
  }

  .connection-badge .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
  }

  /* ── MESSAGES ── */
  .messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    scroll-behavior: smooth;
  }

  .messages-area::-webkit-scrollbar { width: 4px; }
  .messages-area::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }

  .msg-group { margin-bottom: 14px; }

  .msg-header {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 4px;
  }

  .msg-author {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent2);
  }

  .msg-author.self { color: var(--green); }

  .msg-time {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.04em;
  }

  .msg-bubble {
    padding: 8px 12px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px 12px 12px 12px;
    color: var(--text);
    line-height: 1.6;
    display: inline-block;
    max-width: 72%;
    word-break: break-word;
    font-size: 13px;
  }

  .msg-bubble.self {
    background: var(--accent-bg);
    border-color: rgba(124,106,247,0.2);
    border-radius: 12px 4px 12px 12px;
    color: var(--text);
  }

  .msg-group.self .msg-header { flex-direction: row-reverse; }
  .msg-group.self { display: flex; flex-direction: column; align-items: flex-end; }

  .system-msg {
    text-align: center;
    color: var(--text3);
    font-size: 11px;
    padding: 6px 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .system-msg::before,
  .system-msg::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .typing-indicator {
    padding: 6px 14px;
    color: var(--text3);
    font-size: 11px;
    font-style: italic;
    min-height: 24px;
    transition: opacity 0.2s;
  }

  /* ── INPUT AREA ── */
  .input-area {
    padding: 14px 24px 16px;
    border-top: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
  }

  .input-wrap {
    display: flex;
    gap: 10px;
    align-items: center;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px 4px 4px 14px;
    transition: border 0.15s;
  }

  .input-wrap:focus-within { border-color: var(--accent); }

  .message-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 6px 0;
    line-height: 1.5;
    resize: none;
    height: 36px;
    max-height: 120px;
  }

  .message-input::placeholder { color: var(--text3); }

  .send-btn {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .send-btn:hover { background: var(--accent2); transform: scale(1.05); }
  .send-btn:active { transform: scale(0.96); }
  .send-btn:disabled { background: var(--bg4); cursor: not-allowed; transform: none; }

  /* ── AUTH SCREEN ── */
  .auth-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  .auth-card {
    width: 380px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 36px 32px;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .auth-logo {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 4px;
  }

  .auth-logo span { color: var(--accent2); }

  .auth-sub {
    color: var(--text3);
    font-size: 12px;
    margin-bottom: 28px;
    letter-spacing: 0.02em;
  }

  .auth-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 22px;
    background: var(--bg3);
    padding: 4px;
    border-radius: var(--radius);
  }

  .auth-tab {
    flex: 1;
    padding: 7px;
    background: none;
    border: none;
    border-radius: 7px;
    color: var(--text2);
    font-family: var(--font-mono);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }

  .auth-tab.active {
    background: var(--bg);
    color: var(--accent2);
    border: 1px solid var(--border2);
  }

  .form-group { margin-bottom: 14px; }

  .form-label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 6px;
    font-weight: 500;
  }

  .form-input {
    width: 100%;
    padding: 10px 12px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    outline: none;
    transition: border 0.15s;
  }

  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--text3); }

  .btn-primary {
    width: 100%;
    padding: 11px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #fff;
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.04em;
    margin-top: 20px;
    transition: all 0.15s;
  }

  .btn-primary:hover { background: var(--accent2); }
  .btn-primary:active { transform: scale(0.99); }
  .btn-primary:disabled { background: var(--bg4); color: var(--text3); cursor: not-allowed; }

  .auth-error {
    background: rgba(245,101,101,0.1);
    border: 1px solid rgba(245,101,101,0.25);
    color: var(--red);
    font-size: 11px;
    padding: 8px 12px;
    border-radius: 8px;
    margin-top: 12px;
    display: none;
  }

  .auth-error.show { display: block; }

  /* ── EMPTY STATE ── */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text3);
    gap: 10px;
  }

  .empty-icon { font-size: 40px; opacity: 0.3; }

  .empty-title {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 600;
    color: var(--text2);
  }

  .empty-sub { font-size: 12px; }

  /* ── NOISE OVERLAY ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }

  /* scrollbar global */
  * {
    scrollbar-width: thin;
    scrollbar-color: var(--bg4) transparent;
  }

  .hidden { display: none !important; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-group { animation: fadeIn 0.2s ease; }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div class="auth-screen" id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">Nex<span>Chat</span></div>
    <div class="auth-sub">// real-time developer chat</div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">login</button>
      <button class="auth-tab" onclick="switchTab('register')">register</button>
    </div>

    <div class="form-group">
      <label class="form-label">username</label>
      <input class="form-input" type="text" id="authUsername" placeholder="your_username" autocomplete="off" />
    </div>
    <div class="form-group">
      <label class="form-label">password</label>
      <input class="form-input" type="password" id="authPassword" placeholder="••••••••" />
    </div>

    <div class="auth-error" id="authError"></div>

    <button class="btn-primary" id="authBtn" onclick="handleAuth()">connect →</button>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <div class="logo-dot"></div>
      Nex<span>Chat</span>
    </div>
    <div class="user-badge" id="userBadge">
      <div class="avatar" id="userAvatar">?</div>
      <div>
        <div class="user-name" id="userNameDisplay">—</div>
        <div class="user-tag">online</div>
      </div>
      <div class="status-dot"></div>
    </div>
  </div>

  <div class="sidebar-section">rooms</div>
  <div class="rooms-list" id="roomsList">
    <div class="room-item" onclick="joinRoom('general')">
      <span class="room-hash">#</span> general
    </div>
    <div class="room-item" onclick="joinRoom('dev')">
      <span class="room-hash">#</span> dev
    </div>
    <div class="room-item" onclick="joinRoom('random')">
      <span class="room-hash">#</span> random
    </div>
    <div class="room-item" onclick="joinRoom('nodejs')">
      <span class="room-hash">#</span> nodejs
    </div>
  </div>

  <div class="new-room-wrap">
    <div class="new-room-form">
      <input type="text" id="newRoomInput" placeholder="new-room" maxlength="20"
             onkeydown="if(event.key==='Enter') createRoom()" />
      <button class="btn-icon" onclick="createRoom()" title="Add room">+</button>
    </div>
  </div>

  <div class="sidebar-footer">
    <button class="btn-logout" onclick="logout()">disconnect ⏻</button>
  </div>
</div>

<!-- MAIN CHAT -->
<div class="main">
  <div class="chat-header">
    <div class="chat-room-name" id="chatRoomName">
      <span>select a room</span>
    </div>
    <div class="connection-badge disconnected" id="connectionBadge">
      <div class="dot"></div> offline
    </div>
  </div>

  <div class="messages-area" id="messagesArea">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">⌨</div>
      <div class="empty-title">No room selected</div>
      <div class="empty-sub">Pick a room on the left to start chatting</div>
    </div>
  </div>

  <div class="typing-indicator" id="typingIndicator"></div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea class="message-input" id="messageInput"
        placeholder="type a message..."
        rows="1"
        onkeydown="handleInputKey(event)"
        oninput="handleTyping()"
        disabled></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>↑</button>
    </div>
  </div>
</div>

<script>
  const SERVER = window.location.hostname === 'localhost'
    ? 'http://localhost:3000'
    : window.location.origin;

  let token = localStorage.getItem('nex_token') || null;
  let username = localStorage.getItem('nex_username') || null;
  let socket = null;
  let currentRoom = null;
  let currentTab = 'login';
  let typingTimeout = null;
  let isTyping = false;

  // ── INIT ──────────────────────────────────────────────
  function init() {
    if (token && username) {
      showApp();
      connectSocket();
    }
  }

  function showApp() {
    document.getElementById('authScreen').classList.add('hidden');
    document.getElementById('userNameDisplay').textContent = username;
    document.getElementById('userAvatar').textContent = username.slice(0, 2).toUpperCase();
  }

  // ── AUTH ──────────────────────────────────────────────
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.auth-tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
    document.getElementById('authError').classList.remove('show');
    document.getElementById('authBtn').textContent = tab === 'login' ? 'connect →' : 'create account →';
  }

  async function handleAuth() {
    const u = document.getElementById('authUsername').value.trim();
    const p = document.getElementById('authPassword').value;
    const errEl = document.getElementById('authError');
    const btn = document.getElementById('authBtn');

    if (!u || !p) { showAuthError('Username and password required'); return; }

    btn.disabled = true;
    btn.textContent = 'connecting...';
    errEl.classList.remove('show');

    const endpoint = currentTab === 'login' ? '/auth/login' : '/auth/register';

    try {
      const res = await fetch(SERVER + endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: u, password: p })
      });

      const data = await res.json();

      if (!res.ok) {
        showAuthError(data.error || 'Something went wrong');
        btn.disabled = false;
        btn.textContent = currentTab === 'login' ? 'connect →' : 'create account →';
        return;
      }

      token = data.token;
      username = data.username;
      localStorage.setItem('nex_token', token);
      localStorage.setItem('nex_username', username);
      showApp();
      connectSocket();

    } catch (e) {
      showAuthError('Cannot reach server. Is it running?');
      btn.disabled = false;
      btn.textContent = currentTab === 'login' ? 'connect →' : 'create account →';
    }
  }

  function showAuthError(msg) {
    const el = document.getElementById('authError');
    el.textContent = msg;
    el.classList.add('show');
  }

  function logout() {
    if (socket) socket.disconnect();
    localStorage.removeItem('nex_token');
    localStorage.removeItem('nex_username');
    token = null; username = null; socket = null; currentRoom = null;
    document.getElementById('authScreen').classList.remove('hidden');
    document.getElementById('authUsername').value = '';
    document.getElementById('authPassword').value = '';
    document.getElementById('authBtn').disabled = false;
    document.getElementById('authBtn').textContent = 'connect →';
    document.querySelectorAll('.room-item').forEach(r => r.classList.remove('active'));
    clearMessages();
  }

  // ── SOCKET ────────────────────────────────────────────
  function connectSocket() {
    socket = io(SERVER, { auth: { token } });

    socket.on('connect', () => {
      setBadge(true);
      enableInput(false);
    });

    socket.on('disconnect', () => {
      setBadge(false);
      enableInput(false);
    });

    socket.on('connect_error', (err) => {
      setBadge(false);
    });

    socket.on('message_history', (messages) => {
      clearMessages();
      if (messages.length === 0) {
        appendSystem('no messages yet — be the first!');
        return;
      }
      appendSystem(`— last ${messages.length} messages —`);
      messages.forEach(m => appendMessage(m.username, m.content, m.created_at));
    });

    socket.on('new_message', (msg) => {
      appendMessage(msg.username, msg.content, msg.created_at);
      scrollToBottom();
    });

    socket.on('user_joined', (data) => {
      appendSystem(`${data.username} joined`);
    });

    socket.on('user_left', (data) => {
      appendSystem(`${data.username} left`);
    });

    socket.on('user_typing', ({ username: u, isTyping: typing }) => {
      const el = document.getElementById('typingIndicator');
      el.textContent = typing ? `${u} is typing...` : '';
    });

    socket.on('error_message', (data) => {
      appendSystem('⚠ ' + data.error);
    });
  }

  // ── ROOMS ─────────────────────────────────────────────
  function joinRoom(room) {
    if (!socket?.connected) return;
    if (currentRoom === room) return;

    // Leave previous room
    if (currentRoom) socket.emit('leave_room', { room: currentRoom });

    currentRoom = room;

    // Update UI
    document.querySelectorAll('.room-item').forEach(el => {
      el.classList.toggle('active', el.textContent.trim() === room);
    });

    document.getElementById('chatRoomName').innerHTML =
      `<span class="hash">#</span> ${room}`;
    document.getElementById('emptyState')?.remove();

    clearMessages();
    appendSystem(`joining #${room}...`);
    enableInput(true);

    socket.emit('join_room', { room });
    document.getElementById('messageInput').focus();
    document.getElementById('typingIndicator').textContent = '';
  }

  function createRoom() {
    const input = document.getElementById('newRoomInput');
    const name = input.value.trim().toLowerCase().replace(/[^a-z0-9-]/g, '-');
    if (!name) return;

    // Add to list
    const list = document.getElementById('roomsList');
    const existing = [...list.querySelectorAll('.room-item')].find(
      el => el.textContent.trim() === name
    );

    if (!existing) {
      const el = document.createElement('div');
      el.className = 'room-item';
      el.innerHTML = `<span class="room-hash">#</span> ${name}`;
      el.onclick = () => joinRoom(name);
      list.appendChild(el);
    }

    input.value = '';
    joinRoom(name);
  }

  // ── MESSAGES ─────────────────────────────────────────
  function sendMessage() {
    const input = document.getElementById('messageInput');
    const content = input.value.trim();
    if (!content || !currentRoom || !socket?.connected) return;

    socket.emit('send_message', { room: currentRoom, content });
    input.value = '';
    input.style.height = 'auto';

    // Stop typing
    if (isTyping) {
      socket.emit('typing', { room: currentRoom, isTyping: false });
      isTyping = false;
    }
  }

  function handleInputKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function handleTyping() {
    if (!currentRoom || !socket?.connected) return;

    if (!isTyping) {
      isTyping = true;
      socket.emit('typing', { room: currentRoom, isTyping: true });
    }

    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
      isTyping = false;
      socket.emit('typing', { room: currentRoom, isTyping: false });
    }, 1500);
  }

  function appendMessage(author, content, timestamp) {
    const area = document.getElementById('messagesArea');
    const isSelf = author === username;
    const time = timestamp ? new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';

    const group = document.createElement('div');
    group.className = 'msg-group' + (isSelf ? ' self' : '');
    group.innerHTML = `
      <div class="msg-header">
        <span class="msg-author ${isSelf ? 'self' : ''}">${escHtml(author)}</span>
        <span class="msg-time">${time}</span>
      </div>
      <div class="msg-bubble ${isSelf ? 'self' : ''}">${escHtml(content)}</div>
    `;

    area.appendChild(group);
    scrollToBottom();
  }

  function appendSystem(text) {
    const area = document.getElementById('messagesArea');
    const el = document.createElement('div');
    el.className = 'system-msg';
    el.textContent = text;
    area.appendChild(el);
  }

  function clearMessages() {
    const area = document.getElementById('messagesArea');
    area.innerHTML = '';
  }

  function scrollToBottom() {
    const area = document.getElementById('messagesArea');
    area.scrollTop = area.scrollHeight;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── UI HELPERS ────────────────────────────────────────
  function setBadge(connected) {
    const el = document.getElementById('connectionBadge');
    el.className = 'connection-badge ' + (connected ? 'connected' : 'disconnected');
    el.innerHTML = `<div class="dot"></div> ${connected ? 'live' : 'offline'}`;
  }

  function enableInput(on) {
    document.getElementById('messageInput').disabled = !on;
    document.getElementById('sendBtn').disabled = !on;
  }

  // Enter key in auth
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !document.getElementById('authScreen').classList.contains('hidden')) {
      handleAuth();
    }
  });

  init();
</script>
</body>
</html>
